name: RSS Article Monitor

on:
  schedule:
    - cron: '0 * * * *'      # every 60 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

permissions:
  contents: write              # needed to save rss_seen.json via cache

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25        # 2 articles × ~10 min each = 20 min max

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      # ── 3. Restore seen-articles list ──────────────────────────────────────
      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: .tmp/rss_seen.json
          key: rss-seen-${{ github.run_number }}
          restore-keys: rss-seen-

      - name: Ensure .tmp dir exists
        run: mkdir -p .tmp

      # ── 4. Arabic font ─────────────────────────────────────────────────────
      - name: Install Arabic fonts (Noto)
        run: |
          mkdir -p assets/fonts
          if [ ! -f assets/fonts/tahoma.ttf ]; then
            echo "[font] Installing Noto Arabic fonts via apt..."
            sudo apt-get install -y --no-install-recommends fonts-noto-core
            FONT=$(fc-match --format="%{file}" ":lang=ar:weight=80" 2>/dev/null)
            FONT_BOLD=$(fc-match --format="%{file}" ":lang=ar:weight=200" 2>/dev/null)
            cp "$FONT" assets/fonts/tahoma.ttf
            [ -f "$FONT_BOLD" ] && cp "$FONT_BOLD" assets/fonts/tahomabd.ttf || cp "$FONT" assets/fonts/tahomabd.ttf
            echo "[font] Regular: $FONT"
            echo "[font] Bold: $FONT_BOLD"
          else
            echo "[font] Font already present in assets/fonts/"
          fi

      # ── 5. Write secrets to disk ───────────────────────────────────────────
      - name: Write Gmail token
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: printf '%s' "$GMAIL_TOKEN" > token.json

      - name: Write Gmail client secret
        env:
          GMAIL_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET_JSON }}
        run: printf '%s' "$GMAIL_SECRET" > client_secret.json

      # ── 6. Build .env ──────────────────────────────────────────────────────
      - name: Create .env
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }}
        run: |
          {
            echo "GEMINI_API_KEY=$GEMINI_API_KEY"
            echo "GEMINI_MODEL=gemini-2.5-flash"
            echo "GMAIL_USER=shawada6@gmail.com"
            echo "GOOGLE_CLIENT_SECRET_FILE=client_secret.json"
            echo "RECIPIENT_EMAIL=$RECIPIENT_EMAIL"
            echo "RSS_FEEDS=$RSS_FEEDS"
            echo "LOGO_PATH=assets/logo.png"
            echo "BRAND_COLOR_PRIMARY=#1A2F5A"
            echo "BRAND_COLOR_ACCENT=#F4A300"
            echo "RSS_POLL_INTERVAL=60"
          } > .env

      # ── 7. Run monitor (once) ──────────────────────────────────────────────
      - name: Run RSS monitor
        run: python tools/rss_monitor.py --once
